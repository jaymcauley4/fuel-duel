name: Update Gas Prices

on:
  schedule:
    - cron: '0 */6 * * *'   # 4x per day: midnight, 6am, noon, 6pm UTC
  workflow_dispatch:          # manual trigger from Actions tab

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright playwright-stealth
          playwright install chromium --with-deps

      - name: Fetch gas prices
        run: python scraper/update_prices.py

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "chore: update gas prices"
          git push
